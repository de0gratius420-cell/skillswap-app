<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade Skills | SkillSwap</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== RESET ===== */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(
          135deg,
          #6366f1 0%,
          #8b5cf6 50%,
          #ec4899 100%
        );
        background-attachment: fixed;
        padding-top: 96px; /* Space for fixed navbar + gap */
        color: #1e293b;
      }

      /* ===== NAVBAR ===== */
      .dashboard-navbar {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 32px);
        max-width: 1200px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 16px;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.05),
          0 10px 15px -3px rgba(0, 0, 0, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.6);
        z-index: 1000;
        transition: all 0.3s ease;
      }

      .dashboard-navbar.scrolled {
        box-shadow:
          0 10px 25px -5px rgba(0, 0, 0, 0.1),
          0 8px 10px -6px rgba(0, 0, 0, 0.05);
        background: rgba(255, 255, 255, 0.92);
      }

      /* ===== BRAND ===== */
      .nav-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 140px;
        text-decoration: none;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
        font-weight: 700;
        box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
      }

      .brand-text {
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: -0.5px;
      }

      /* ===== SEARCH ===== */
      .nav-search {
        flex: 1;
        max-width: 420px;
        margin: 0 20px;
      }

      .search-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        background: rgba(241, 245, 249, 0.9);
        border: 1.5px solid transparent;
        border-radius: 12px;
        padding: 0 12px;
        height: 40px;
        transition: all 0.2s ease;
      }

      .search-wrapper:hover {
        background: rgba(255, 255, 255, 0.95);
      }

      .search-wrapper:focus-within {
        background: #ffffff;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
      }

      .search-icon {
        color: #94a3b8;
        font-size: 14px;
        margin-right: 8px;
        flex-shrink: 0;
      }

      .search-wrapper input {
        flex: 1;
        border: none;
        background: transparent;
        outline: none;
        font-size: 14px;
        color: #0f172a;
        font-family: inherit;
        width: 100%;
      }

      .search-wrapper input::placeholder {
        color: #94a3b8;
      }

      .shortcut {
        font-size: 11px;
        font-weight: 600;
        color: #64748b;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        padding: 2px 6px;
        margin-left: 8px;
        flex-shrink: 0;
        font-family: inherit;
      }

      /* ===== ACTIONS ===== */
      .nav-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 180px;
        justify-content: flex-end;
      }

      .nav-btn {
        position: relative;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        border: none;
        background: transparent;
        color: #64748b;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        transition: all 0.2s ease;
      }

      .nav-btn:hover {
        background: rgba(241, 245, 249, 0.9);
        color: #0f172a;
        transform: translateY(-1px);
      }

      .nav-btn:active {
        transform: translateY(0);
      }

      .badge {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 16px;
        height: 16px;
        background: #ef4444;
        color: white;
        font-size: 10px;
        font-weight: 700;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255, 255, 255, 0.9);
        font-family: inherit;
      }

      /* ===== USER PROFILE ===== */
      .user-menu {
        position: relative;
        margin-left: 4px;
      }

      .profile-trigger {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 10px 6px 6px;
        border-radius: 12px;
        border: none;
        background: transparent;
        cursor: pointer;
        transition: all 0.2s ease;
        font-family: inherit;
      }

      .profile-trigger:hover {
        background: rgba(241, 245, 249, 0.9);
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        object-fit: cover;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 12px;
        font-weight: 600;
      }

      .user-info {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
        text-align: left;
      }

      .user-name {
        font-size: 13px;
        font-weight: 600;
        color: #0f172a;
      }

      .user-role {
        font-size: 11px;
        color: #64748b;
      }

      .chevron {
        color: #94a3b8;
        font-size: 12px;
        margin-left: 2px;
      }

      /* Dropdown */
      .dropdown-menu {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        width: 200px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(226, 232, 240, 0.8);
        border-radius: 14px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        padding: 8px;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-8px) scale(0.96);
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 1001;
      }

      .user-menu:hover .dropdown-menu,
      .dropdown-menu:hover {
        opacity: 1;
        visibility: visible;
        transform: translateY(0) scale(1);
      }

      .dropdown-menu a {
        display: flex;
        align-items: center;
        padding: 10px 12px;
        border-radius: 10px;
        color: #0f172a;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.15s ease;
      }

      .dropdown-menu a:hover {
        background: #f1f5f9;
        color: #6366f1;
      }

      .dropdown-menu .divider {
        height: 1px;
        background: #e2e8f0;
        margin: 6px 8px;
      }

      .dropdown-menu .logout {
        color: #ef4444;
      }

      .dropdown-menu .logout:hover {
        background: #fef2f2;
        color: #dc2626;
      }

      /* ===== HERO SECTION ===== */
      .hero {
        max-width: 1200px;
        margin: 0 auto;
        padding: 60px 24px;
        text-align: center;
      }

      .hero h1 {
        font-size: 48px;
        font-weight: 800;
        color: white;
        margin-bottom: 16px;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.15);
        letter-spacing: -1.5px;
        line-height: 1.1;
      }

      .hero p {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.85);
        max-width: 560px;
        margin: 0 auto 32px;
        line-height: 1.6;
      }

      /* ===== LOGIN FORM ===== */
      .login-form {
        max-width: 420px;
        margin: 0 auto;
        padding: 40px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 24px;
        box-shadow:
          0 25px 50px -12px rgba(0, 0, 0, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
        color: white;
      }

      .login-form h2 {
        text-align: center;
        margin-bottom: 28px;
        font-size: 24px;
        font-weight: 700;
        color: white;
      }

      .input-group {
        position: relative;
        margin-bottom: 20px;
      }

      .input-group input {
        width: 100%;
        padding: 14px 16px;
        font-size: 15px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.12);
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        color: white;
        outline: none;
        font-family: inherit;
        transition: all 0.2s ease;
      }

      .input-group input::placeholder {
        color: rgba(255, 255, 255, 0.5);
      }

      .input-group input:focus {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.5);
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
      }

      .input-group label {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.6);
        font-size: 15px;
        pointer-events: none;
        transition: all 0.2s ease;
        background: transparent;
        padding: 0 4px;
      }

      .input-group input:focus + label,
      .input-group input:not(:placeholder-shown) + label {
        top: 0;
        font-size: 12px;
        color: white;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 4px;
      }

      .login-btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s ease;
        box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
        margin-top: 8px;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(99, 102, 241, 0.5);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .nav-search {
          display: none;
        }
        .user-info {
          display: none;
        }
        .brand-text {
          font-size: 16px;
        }
        .hero h1 {
          font-size: 32px;
        }
        .login-form {
          margin: 0 16px;
          padding: 28px;
        }
      }

      /* ===== SCROLLBAR ===== */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <!-- ===== NAVBAR ===== -->
    <nav class="dashboard-navbar" id="navbar">
      <!-- Brand -->
      <a href="#" class="nav-brand">
        <div class="logo-icon">⚡</div>
        <span class="brand-text">SkillSwap</span>
      </a>

      <!-- Search -->
      <div class="nav-search">
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search skills, mentors..." />
          <kbd class="shortcut">⌘K</kbd>
        </div>
      </div>

      <!-- Actions -->
      <div class="nav-actions">
        <button class="nav-btn" title="Notifications">
          🔔
          <span class="badge">3</span>
        </button>
        <button class="nav-btn" title="Messages">✉️</button>

        <div class="user-menu">
          <button class="profile-trigger">
            <div class="avatar">AC</div>
            <div class="user-info">
              <span class="user-name">Alex Chen</span>
              <span class="user-role">Pro Trader</span>
            </div>
            <span class="chevron">▼</span>
          </button>
          <div class="dropdown-menu">
            <a href="#">📊 Dashboard</a>
            <a href="#">👤 Profile</a>
            <a href="#">⚙️ Settings</a>
            <div class="divider"></div>
            <a href="#" class="logout">🚪 Sign Out</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- ===== HERO / LOGIN ===== -->
    <section class="hero">
      <h1>Trade Skills in Minutes!</h1>
      <p>
        Teach what you know — Learn what you don't. Trade skills live with
        people ready to swap.
      </p>

      <div class="login-form">
        <h2>Welcome Back</h2>
        <div class="input-group">
          <input type="email" id="email" placeholder=" " required />
          <label for="email">Email address</label>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder=" " required />
          <label for="password">Password</label>
        </div>
        <button class="login-btn" type="submit">Log In</button>
      </div>
    </section>

    <script>
      // Navbar scroll effect
      window.addEventListener("scroll", () => {
        const nav = document.getElementById("navbar");
        if (window.scrollY > 10) {
          nav.classList.add("scrolled");
        } else {
          nav.classList.remove("scrolled");
        }
      });

      // Keyboard shortcut for search (Cmd/Ctrl + K)
      document.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "k") {
          e.preventDefault();
          document.querySelector(".search-wrapper input").focus();
        }
      });
    </script>
  </body>
</html>
