<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Offer Skill | SkillSwap</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>What can you teach?</h1>
      <form id="offer-form" action="/save-offer" method="POST">
        <input type="text" name="name" placeholder="Your full name" required />
        <input type="email" name="email" placeholder="Your email" required />
        <textarea
          name="skill_teaching"
          rows="4"
          placeholder="Any relevant skills, Python basics, Guitar chords..."
          required
        ></textarea>
        <textarea
          name="skill_learning"
          rows="4"
          placeholder="What you'd like to learn..."
          required
        ></textarea>
        <select id="timezone" name="timezone">
          <option value="UTC-12">UTC-12</option>
          <!-- Add remaining timezone options -->
          <option value="UTC+12">UTC+12</option>
        </select>
        <div class="checkboxes">
          <label
            ><input type="checkbox" name="availability[]" value="morning" />
            Morning</label
          >
          <label
            ><input type="checkbox" name="availability[]" value="afternoon" />
            Afternoon</label
          >
          <label
            ><input type="checkbox" name="availability[]" value="evening" />
            Evening</label
          >
          <label
            ><input type="checkbox" name="availability[]" value="weekend" />
            Weekend</label
          >
          <label
            ><input type="checkbox" name="availability[]" value="anytime" />
            Anytime</label
          >
        </div>
        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
  <script src="/splide.min.js"></script>
  <script>
    // Handle form submission
    document
      .getElementById("offer-form")
      .addEventListener("submit", function (event) {
        event.preventDefault();
        const formData = new FormData(this);
        fetch("/save-offer", { method: "POST", body: formData })
          .then((response) => response.json())
          .then((data) => {
            alert(
              `You're in! Check your email when someone wants to learn from you.`,
            );
          });
      });
  </script>
</html>
