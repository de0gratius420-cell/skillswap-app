<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trade Skills | SkillSwap</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }
      body {
        height: 100vh;
        font-family: inter, -apple-system, system-ui, sans-serif;
        background: linear-gradient(
          135deg,
          #6366f1,
          #8b5cf6,
          #ec4899,

        );
        padding-top: 80px;
      }
      .login-form {
        max-width: 400px;
        margin: 0 auto;
        padding: 40px;
        background: white;
        backdrop-filter: blur(20px);
        border: 1px solid white;
        border-radius: 25px;
        color:white;
        box-shadow: 0 20px 50px rgb(7, 2, 5, 0.5);
      }
      .login-form h2 {
        text-align: center;
        margin-bottom: 30px;
      }

      input-box input {
        width: 100%;
        padding: 15px 10px;
        font-size: 16px;
        border-radius: 5px;
        background: transparent;
        border: none;
        border-bottom: 2px solid #068fff;
        color:azure;
        outline:none
      }
      input-group label {
        position: absolute;
        left: 10;
        transform: translateY(-50%);
        top: 50px;
        transition: 3s;

      }
      input-box label {
        position: absolute;
        left: 10;
        transform: translateY(-50%);
        top: 50px;
        transition: 3s;

      }

      input-box input:focus + label,
      input-box input:valid + label {
        top: -10px;
        font-size: 12px;
      }

      button{
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 50px;
        background: linear-gradient(
          90deg
          #6366f1
          #8b5cf6
        );
        color: white;
        cursor: pointer;
        transition: 3s;

      }
      button:hover {
        transform: scale(1.05);
      }
      
      navbar {
        display: flex;
        max-width: 1200px;
        transform: translateX(-50%);
        top: 16px;
        left: 50%;
        width: calc(100% - 48px);
        justify-content: space-between;
        align-items: center;
        padding: 0 24px;
        border-radius: 16px;
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        background-color: rgba(255, 255, 255, 0.75);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      }
      <>
        <div class="logo">SkillSwap</div>
        <div class="nav-links">
          <a href="/find">Find Skills</a>
          <a href="/offer">Offer Skills</a>
          <a href="/login">Login</a>
        </div>

      <!-- center: search bar, -->
      <div class="search-bar">
        <input type="text" placeholder="Search skills..." />
        <button>Search</button>
        <span class="login-button"><a href="/login">Login</a></span>
        <input type="text" placeholder="Search skills..." />
        <kbd class="login-button"><a href="/login">Login</a></kbd>
      </div>
    </div>

    <!--right: login button-->
    <div class="login-button">
      <a href="/login">Login</a>
      <button class="login-button"><a href="/login">Login</a></button>
      <button class="nav-button"><a href="/login">Login</a></button>
      <div class="user-profile">
        <img src="profile.jpg" alt="User Profile" />
        <button class="logout-button">Logout</button>
        <img src="avatar.jpg" alt="User Avatar" class="avatar" />
        <div class="dropdown">
          <button class="dropbtn">Profile</button>
          <div class="dropdown-content">
            <a href="/profile">View Profile</a>
            <a href="/settings">Settings</a>
            <a href="/logout">Logout</a>
          </div>
          <span>^</span>
          </button>
        </div>
      </div>
    </navbar>

    .nav-brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 140px;
      }
      .logo-icon {
        width: 36px;
        height: 36px;
        background:linear-gradient(
          135deg,
          #6366f1,
          #a855f7,
        );
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
      }
      .brand-text {
        font-size: 18px;
        font-weight: 700;
        color: #0f172a;
        letter-spacing: 0.5px;
      }
      .nav-search {
        flex: 1;
        max-width: 400px;
        margin: 0 24px;
      }
      .search-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(241, 245, 249, 0.8);
        border-radius: 12px;
        padding: 0 14px;
        height: 40px;
        transition: all 0.2s ease;
      }.search-wrapper:focus-within {
        background: rgba(255, 255, 255, 1);
        box-shadow: 0 0px 0px 3px rgba(99, 102, 241, 0.15);
      }
      .search-wrapper input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        font-size: 14px;
        color: #0f172a;
        padding: 0 10px;
      }
      .search-wrapper input::placeholder {
        color: #64748b;
      }
      .shortcut {
        display: flex;
        background: white;
        border-radius: 6px;
        padding: 2px 6px;
        border: 1px solid #e2e8f0;
        font-weight: 600;
        font-size: 11px;
        color: #64748b;
      }
      
      /* ===== actions ===== */
      .nav-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 180px;
        justify-content: flex-end;
      }
      .nav-btn {
        color: #475569;
        width: 40px;
        height: 40px;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        padding: 8px 16px;
        font-size: 18px;
        position: relative;
        background: transparent;
        transition: all 0.2s ease;
      }
      .nav-btn:hover {
        background: rgba(241, 245, 249, 0.8);
        color: #0f172a;
      }
      .badge {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 16px;
        height: 16px;
        background: #ef4444;
        color: white;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid rgba(255, 255, 255, 0.8);
      }

      /* ===== user profile ===== */
      .user-profile {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 12px 6px 6px;
        border-radius:12px;
        background: transparent;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .user-profile:hover {
        background: rgba(241, 245, 249, 0.8);
      }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        object-fit: cover;
        background:linear-gradient(
          135deg,
          #6366f1,
          #a855f7,
        );
      }
      .user-info {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
        text-align: left;
      }
      .user-name {
        font-size: 13px;
        font-weight: 600;
        color: #0f172a;
      }
      .user-role {
        font-size: 11px;
        color: #64748b;
      }

    </style>
  </head>
  <body>
    <div class="container">
      <h1>Trade Skills in Minutes!</h1>
      <p>Teach what you know - Learn what you don't. Trade skills live.</p>
      <div class="counter">x people ready to swap</div>
      <button href="/find" class="cta-btn">I want to learn something</button>
      <button href="/offer" class="cta-btn">I want to teach something</button>
    </div class="container">
    <form class="login-form"">
      <h2>welcome back</h2>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required />
      </div>
      <button type="submit" class="cta-btn">Login</button>
    </form>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/@splide/splide@1.12.0/dist/splide.min.js"></script>
  <script>
    // Counter functionality
    fetch("http://localhost:3000/counter")
      .then((response) => response.json())
      .then((data) => {
        document.querySelector(".counter").textContent =
          `x people ready to swap`;
      });
  </script>
</html>
